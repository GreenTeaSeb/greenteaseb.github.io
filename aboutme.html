<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/slider.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;1,100&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu&display=swap" rel="stylesheet"> 
    
    
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/solid.css"
       integrity="sha384-LA8Ug4T/nhVkyhrSmSirsoAo9iDrBk8E7U80aSPeD+w3vO8PzOJIS6agGcbIwwX0" crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/fontawesome.css"
       integrity="sha384-wESLQ85D6gbsF459vf1CiZ2+rr+CsxRY0RpiF1tLlQpDnAgg6rwdsUF1+Ics2bni" crossorigin="anonymous">
 
    <script src="main.js" defer></script>
    <script src="slider.js" defer></script>
</head>
<body>
    <aside id="sidemenu">
        <div id="logo">
            <object  class="custom-logo" type="image/svg+xml" data="icon2.svg"></object>
            <object  class="custom-logo-small" type="image/svg+xml" data="icon.svg"></object>
         </div>
         <ul id="categories-list">
            <li class="category" id="index">
               <a class="unselectable" href="index.html"> <i class="fas fa-star"></i> HOME</a>
            </li>
            <li class="category" id="projects">
               <a class="unselectable"><i class="fas fa-chart-line"></i>PROJECTS</a>
            </li>
            <li class="category" id="links">
               <a class="unselectable"> <i class="fas fa-edit"></i>LINKS</a>
            </li>
            <li class="category active" id="aboutme">
               <a class="unselectable" href="aboutme.html"><i class="fas fa-address-card"></i>ABOUT ME</a>
            </li>
            <li class="category odjava" id="logout">
               <a class="unselectable"><i class="fas fa-sign-out-alt"></i>ODJAVA</a>
               </li>
         </ul>
    </aside>
    <main id="content">
      <div class="container">
         <div class="image-container">
            <img
              class="image-before slider-image"
               src="data/aboutme_after.jpg"
              alt="color photo"
            />
            <img
              class="image-after slider-image"
               src="data/aboutme_before.jpg"
              alt="black and white"
            />
          </div>
          <!-- step="10" -->
          <input
            type="range"
            min="0"
            max="100"
            value="50"
            aria-label="Percentage of before photo shown"
            class="slider"
          />
          <div class="slider-line" aria-hidden="true"></div>
          <div class="slider-button" aria-hidden="true">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="30"
              height="30"
              fill="currentColor"
              viewBox="0 0 256 256"
            >
              <rect width="256" height="256" fill="none"></rect>
              <line
                x1="128"
                y1="40"
                x2="128"
                y2="216"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="16"
              ></line>
              <line
                x1="96"
                y1="128"
                x2="16"
                y2="128"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="16"
              ></line>
              <polyline
                points="48 160 16 128 48 96"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="16"
              ></polyline>
              <line
                x1="160"
                y1="128"
                x2="240"
                y2="128"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="16"
              ></line>
              <polyline
                points="208 96 240 128 208 160"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="16"
              ></polyline>
            </svg>
          </div>
      </div>
    </main>
</body>
</html>
